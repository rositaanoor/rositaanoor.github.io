<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>tanggapan</title>
<style>
:root{--hue:220;--sat:60%;--form-width:660px;--ink:hsl(var(--hue),25%,15%);--paper:hsl(var(--hue),30%,97%);--card:hsl(var(--hue),20%,100%);--accent:hsl(var(--hue),var(--sat),48%);--accent-light:hsl(var(--hue),var(--sat),94%);--accent-dark:hsl(var(--hue),var(--sat),36%);--line:hsl(var(--hue),20%,88%);--muted:hsl(var(--hue),15%,52%);--green:hsl(145,55%,35%);--red:hsl(0,65%,50%);--radius:8px;--radius-sm:5px;}
:root.dark{--ink:hsl(var(--hue),20%,90%);--paper:hsl(var(--hue),20%,10%);--card:hsl(var(--hue),18%,15%);--accent:hsl(var(--hue),var(--sat),62%);--accent-light:hsl(var(--hue),var(--sat),20%);--accent-dark:hsl(var(--hue),var(--sat),75%);--line:hsl(var(--hue),15%,25%);--muted:hsl(var(--hue),15%,55%);--green:hsl(145,55%,50%);--red:hsl(0,65%,62%);}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:1.5rem 1rem 5rem;font-size:15px;transition:background .3s,color .3s}
.header{text-align:center;margin-bottom:2rem}
.header h1{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--accent-dark),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--muted);font-size:.75rem;margin-top:.35rem;letter-spacing:.1em;text-transform:uppercase}
.theme-bar{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:1.75rem;flex-wrap:wrap}
.theme-bar span{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700}
.swatch{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0}
.swatch:hover{transform:scale(1.2)}.swatch.active{border-color:var(--ink);transform:scale(1.15)}
#hueSlider{-webkit-appearance:none;appearance:none;width:80px;height:6px;border-radius:3px;background:linear-gradient(to right,hsl(0,60%,50%),hsl(60,60%,50%),hsl(120,60%,50%),hsl(180,60%,50%),hsl(240,60%,50%),hsl(300,60%,50%),hsl(360,60%,50%));outline:none;cursor:pointer;border:none}
#hueSlider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:white;border:2px solid var(--ink);cursor:pointer}
#btnDark{background:none;border:none;cursor:pointer;font-size:1.1rem;padding:0 .2rem;line-height:1}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:1.4rem 1.5rem;max-width:var(--form-width,660px);margin:0 auto 1.1rem;box-shadow:0 2px 16px hsl(var(--hue),30%,50%,.07);transition:background .3s,border-color .3s}
.card-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);font-weight:800;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:2px solid var(--accent-light);display:flex;align-items:center;gap:.4rem}
.card-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.field-grid:last-child{margin-bottom:0}
.field{display:flex;flex-direction:column;gap:.3rem}
.field.span2{grid-column:span 2}
label{font-size:.63rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
input,select{border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:.55rem .7rem;font-family:inherit;font-size:.9rem;color:var(--ink);background:var(--paper);width:100%;-webkit-appearance:none;appearance:none;transition:border-color .15s,box-shadow .15s;outline:none}
input:focus,select:focus{border-color:var(--accent);background:var(--card);box-shadow:0 0 0 3px hsl(var(--hue),var(--sat),48%,.15)}
input[readonly]{color:var(--accent-dark);font-weight:700;cursor:default;background:var(--accent-light);border-color:transparent}
.hint{font-size:.65rem;color:var(--muted);margin-top:.15rem}.hint.ok{color:var(--green);font-weight:700}.hint.err{color:var(--red);font-weight:700}
.btn{display:block;width:100%;max-width:var(--form-width,660px);margin:0 auto;padding:.95rem;background:linear-gradient(135deg,var(--accent-dark),var(--accent));color:white;border:none;border-radius:var(--radius);font-family:inherit;font-size:.82rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:opacity .2s,transform .1s,box-shadow .2s;box-shadow:0 4px 14px hsl(var(--hue),var(--sat),48%,.35)}
.btn:hover:not(:disabled){opacity:.9}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn-ghost{display:block;width:100%;max-width:var(--form-width,660px);margin:.6rem auto 0;padding:.6rem;background:transparent;color:var(--muted);border:1.5px solid var(--line);border-radius:var(--radius);font-family:inherit;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.status{text-align:center;font-size:.75rem;color:var(--muted);margin-top:.85rem;max-width:var(--form-width,660px);margin-left:auto;margin-right:auto;min-height:1.2rem}
.status.ok{color:var(--green);font-weight:700}.status.err{color:var(--red);font-weight:700}
.log-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.btn-sm{padding:.3rem .7rem;background:transparent;color:var(--ink);border:1.5px solid var(--line);border-radius:var(--radius-sm);font-family:inherit;font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
.btn-sm:hover{background:var(--accent);color:white;border-color:var(--accent)}
.btn-sm.danger:hover{background:var(--red);border-color:var(--red)}
.log-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:.75rem;overflow-x:auto;display:block}
.log-table th{background:var(--accent);color:white;padding:.4rem .5rem;text-align:center;font-size:.63rem;text-transform:uppercase;letter-spacing:.05em;font-weight:800;white-space:nowrap}
.log-table td{padding:.4rem .5rem;border-bottom:1px solid var(--line);text-align:center;vertical-align:middle}
.log-table tr:last-child td{border-bottom:none}
.log-table tbody tr:hover td{background:var(--accent-light)}
.ic{background:none;border:none;cursor:pointer;font-size:1.25rem;padding:0 .35rem;transition:color .15s;color:var(--muted);line-height:1}
.ic.del:hover{color:var(--red)}.ic.edit:hover,.ic.dl:hover{color:var(--accent)}
.log-empty{text-align:center;color:var(--muted);font-style:italic;font-size:.82rem;padding:.85rem 0 .25rem}
.lc{font-size:.7rem;color:var(--muted)}
.edit-row td{background:var(--accent-light);padding:.75rem;text-align:left}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.ef{display:flex;flex-direction:column;gap:.2rem}
.ef label{font-size:.6rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700}
.ef input{font-size:.82rem;padding:.4rem .5rem;border:1.5px solid var(--line);border-radius:5px;background:var(--paper);color:var(--ink);font-family:inherit;outline:none}
.ef input:focus{border-color:var(--accent)}
@media(max-width:400px){.field-grid,.edit-grid{grid-template-columns:1fr}.field.span2{grid-column:span 1}}

.sync-box{background:var(--accent-light);border:1.5px solid var(--accent);border-radius:var(--radius);padding:1rem 1.25rem;margin-top:1rem}
.sync-box.sync-active{border-color:var(--green);background:hsl(145,55%,97%)}
:root.dark .sync-box.sync-active{background:hsl(145,30%,12%)}
.sync-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);font-weight:800;margin-bottom:.5rem}
.sync-badge{background:var(--green);color:white;border-radius:4px;padding:.1rem .4rem;font-size:.6rem;margin-left:.4rem;vertical-align:middle}
.sync-desc{font-size:.78rem;color:var(--muted);margin-bottom:.75rem;line-height:1.5}
.sync-row{display:flex;gap:.5rem;align-items:center}
.sync-row input{flex:1;border:1.5px solid var(--line);border-radius:6px;padding:.45rem .7rem;font-size:.82rem;background:var(--paper);color:var(--ink);font-family:inherit;outline:none}
.sync-row input:focus{border-color:var(--accent)}
.sync-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.sync-status{font-size:.75rem;margin-top:.5rem;min-height:1rem;color:var(--muted)}
.sync-status.ok{color:var(--green);font-weight:700}
.sync-status.err{color:var(--red);font-weight:700}
#formOverlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.04);border-radius:var(--radius);z-index:10;pointer-events:auto;cursor:not-allowed;}.form-wrap{position:relative;}#formOverlay .overlay-msg{background:var(--card);border:2px solid var(--accent);border-radius:10px;padding:1.25rem 2rem;text-align:center;pointer-events:none;box-shadow:0 4px 24px hsl(var(--hue),var(--sat),48%,.15);}#formOverlay .overlay-msg p{font-size:.9rem;color:var(--muted);margin-top:.3rem;}.form-locked{opacity:.35;pointer-events:none;user-select:none;filter:blur(1.5px)}
.sync-lock-msg{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.88rem;background:var(--accent-light);border-radius:var(--radius);border:1.5px dashed var(--accent);margin-bottom:1rem}</style>
</head>

  <h1>tanggapan</h1>

    <input type="range" id="widthSlider" min="400" max="900" value="660" step="10" style="-webkit-appearance:none;appearance:none;width:70px;height:6px;border-radius:3px;background:var(--line);outline:none;cursor:pointer;border:none">

</div>
<div class="card">
  <div class="card-title">tanggapan</div>
  <div id="formContainer"></div>

</div>
</div>
<div class="status" id="status"></div>
<div id="syncCard" class="card" style="display:none;margin-top:1.25rem">
  <div id="syncPanel"></div>
</div>
<div id="logSection" style="display:none;margin-top:1.75rem">
  <div class="card">
    <div class="log-hdr">

        <button class="btn-sm" onclick="exportCSV()">&#8595; CSV</button>
        <label class="btn-sm" style="cursor:pointer">&#8593; Import CSV<input type="file" id="csvImportInput" accept=".csv" style="display:none" onchange="importCSV(this)"></label>
        <button class="btn-sm danger" onclick="if(loadLog().length&&confirm('Hapus semua?')){localStorage.removeItem(LK);renderLog();autoCalc();}">Hapus Semua</button>
      </div>
    </div>
    <div id="logBody"><div class="log-empty">Belum ada riwayat.</div></div>
  </div>
</div>

<script>
// ===== THEME ENGINE =====
const TK='lpj_theme_v1';
function applyTheme(hue,sat){
  sat=sat!==undefined?sat:60;
  document.documentElement.style.setProperty('--hue',hue);
  document.documentElement.style.setProperty('--sat',sat+'%');
  document.getElementById('hueSlider').value=hue;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',parseInt(s.dataset.hue)===hue));
  localStorage.setItem(TK,JSON.stringify({hue,sat,dark:document.documentElement.classList.contains('dark')}));
}
function toggleDark(){
  const d=document.documentElement.classList.toggle('dark');
  document.getElementById('btnDark').textContent=d?'☀️':'🌙';
  applyTheme(parseInt(document.documentElement.style.getPropertyValue('--hue'))||220);
}
document.querySelectorAll('.swatch').forEach(s=>s.addEventListener('click',()=>applyTheme(parseInt(s.dataset.hue),parseInt(s.dataset.sat||60))));
document.getElementById('hueSlider').addEventListener('input',e=>{document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));applyTheme(parseInt(e.target.value),60);});

function normalizePlaceholders(xml){
  const RUN=/<w:r\b[^>]*>(?:<w:rPr>[\s\S]*?<\/w:rPr>)?<w:t(?:\s[^>]*)?>([^<]*)<\/w:t><\/w:r>/g;
  let changed=true;
  while(changed){
    changed=false;
    const runs=[...xml.matchAll(/<w:r\b[^>]*>(?:<w:rPr>[\s\S]*?<\/w:rPr>)?<w:t(?:\s[^>]*)?>([^<]*)<\/w:t><\/w:r>/g)];
    for(let i=0;i<runs.length-1;i++){
      const r1=runs[i],r2=runs[i+1];
      const between=xml.slice(r1.index+r1[0].length,r2.index);
      if(/\S/.test(between))continue;
      const t1=r1[1],t2=r2[1];
      if((t1.split('##').length%2===0)||
         (t2.split('##').length%2===0&&t2.includes('##')&&!t2.match(/^##[\w_]+##/))){
        changed=true;
        const rprM=r1[0].match(/<w:rPr>[\s\S]*?<\/w:rPr>/);
        const rpr=rprM?rprM[0]:'';
        const merged='<w:r>'+rpr+'<w:t xml:space="preserve">'+(t1+t2)+'</w:t></w:r>';
        xml=xml.slice(0,r1.index)+merged+xml.slice(r2.index+r2[0].length);
        break;
      }
    }
  }
  return xml;
}
function replaceMergeFields(xml, fields) {
  for (const [name, value] of Object.entries(fields)) {
    const e = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    // Group 1: everything from MERGEFIELD/formula up to and including the "separate" run's </w:r>
    // Group 2: the display runs (may be multiple runs, e.g. "Rp" + value)
    // Group 3: the "end" run — identified as a <w:r> that has NO <w:t> inside it
    const re = new RegExp(
      '((?:MERGEFIELD\\s+' + e + '\\b|=' + e + '\\b)[\\s\\S]*?fldCharType="separate"/>[\\s\\S]*?<\\/w:r>)'
      + '([\\s\\S]*?)'
      + '(<w:r\\b[^>]*>(?:(?!<w:t)[\\s\\S])*?fldCharType="end"/>(?:(?!<w:t)[\\s\\S])*?<\\/w:r>)',
      'g'
    );
    xml = xml.replace(re, (_, g1, g2, g3) => {
      const m = g2.match(/<w:rPr>([\s\S]*?)<\/w:rPr>/);
      const rPr = m ? '<w:rPr>' + m[1] + '</w:rPr>' : '';
      return g1 + '<w:r>' + rPr + '<w:t xml:space="preserve">' + escX(value) + '</w:t></w:r>' + g3;
    });
  }
  return xml;
}

function replacePlaceholders(xml, fields){
  // Normalize split runs first
  xml = normalizePlaceholders(xml);
  for(const [name, value] of Object.entries(fields)){
    const e=name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re=new RegExp('(<w:t[^>]*>)([^<]*)##'+e+'##([^<]*)(<\\/w:t>)','g');
    xml=xml.replace(re,(_,open,pre,post,close)=>open+pre+escX(value)+post+close);
  }
  return xml;
}


// ===== TERBILANG ENGINE =====
const TB_SATUAN = ['','Satu','Dua','Tiga','Empat','Lima','Enam','Tujuh','Delapan','Sembilan',
  'Sepuluh','Sebelas','Dua Belas','Tiga Belas','Empat Belas','Lima Belas','Enam Belas',
  'Tujuh Belas','Delapan Belas','Sembilan Belas'];
const TB_PULUHAN = ['','','Dua Puluh','Tiga Puluh','Empat Puluh','Lima Puluh',
  'Enam Puluh','Tujuh Puluh','Delapan Puluh','Sembilan Puluh'];

function terbilangRatusan(n) {
  n = Math.floor(n);
  if (n === 0) return '';
  if (n < 20) return TB_SATUAN[n];
  if (n < 100) {
    const p = TB_PULUHAN[Math.floor(n/10)];
    const s = TB_SATUAN[n%10];
    return s ? p + ' ' + s : p;
  }
  const ratus = Math.floor(n/100);
  const sisa  = n % 100;
  const r = ratus === 1 ? 'Seratus' : TB_SATUAN[ratus] + ' Ratus';
  const s = terbilangRatusan(sisa);
  return s ? r + ' ' + s : r;
}

function terbilangUang(nominal) {
  nominal = Math.round(Math.abs(parseFloat(nominal) || 0));
  if (nominal === 0) return 'Nol Rupiah';
  const GRUP = ['', 'Ribu', 'Juta', 'Miliar', 'Triliun'];
  const parts = [];
  let n = nominal;
  let g = 0;
  while (n > 0) {
    const r = n % 1000;
    if (r > 0) {
      let s = terbilangRatusan(r);
      if (g === 1 && r === 1) { parts.unshift('Seribu'); n = Math.floor(n / 1000); g++; continue; }
      parts.unshift(s + (GRUP[g] ? ' ' + GRUP[g] : ''));
    }
    n = Math.floor(n / 1000);
    g++;
  }
  return parts.join(' ') + ' Rupiah';
}

const TB_HARI = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const TB_BULAN_PANJANG = ['Januari','Februari','Maret','April','Mei','Juni',
  'Juli','Agustus','September','Oktober','November','Desember'];

function terbilangTanggal(dateStr) {
  // dateStr: YYYY-MM-DD or DD-MM-YYYY or DD/MM/YYYY
  if (!dateStr) return '';
  let d;
  if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
    d = new Date(dateStr + 'T00:00:00');
  } else if (/^\d{2}[\/\-]\d{2}[\/\-]\d{4}$/.test(dateStr)) {
    const [dd, mm, yyyy] = dateStr.split(/[\/\-]/);
    d = new Date(parseInt(yyyy), parseInt(mm)-1, parseInt(dd));
  } else {
    d = new Date(dateStr);
  }
  if (isNaN(d.getTime())) return dateStr;
  const hari   = TB_HARI[d.getDay()];
  const tgl    = terbilangRatusan(d.getDate());
  const bulan  = TB_BULAN_PANJANG[d.getMonth()];
  const tahun  = terbilangTahun(d.getFullYear());
  return hari + ', tanggal ' + tgl + ', bulan ' + bulan + ', tahun ' + tahun;
}

function terbilangTahun(y) {
  // e.g. 2026 -> "Dua Ribu Dua Puluh Enam"
  if (y < 1000) return terbilangRatusan(y);
  const ribuan = Math.floor(y/1000);
  const sisa   = y % 1000;
  const r = ribuan === 1 ? 'Seribu' : terbilangRatusan(ribuan) + ' Ribu';
  const s = sisa > 0 ? ' ' + terbilangRatusan(sisa) : '';
  return r + s;
}

// ── Crypto helpers ───────────────────────────────────────────────

async function hashPassword(password) {
  // SHA-256 dari password → user_id di Supabase
  // Bukan untuk enkripsi, hanya sebagai identifier baris
  const buf = await crypto.subtle.digest(
    'SHA-256',
    new TextEncoder().encode(password)
  );
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

async function deriveKey(password) {
  // PBKDF2: password → AES-256 key
  // 100.000 iterasi membuat brute force sangat lambat
  const raw = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password),
    'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: new TextEncoder().encode('lpj-salt-v1'),
      iterations: 100000, hash: 'SHA-256' },
    raw,
    { name:'AES-GCM', length:256 },
    false, ['encrypt','decrypt']
  );
}

async function encryptLog(data, password) {
  const key = await deriveKey(password);
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const enc = await crypto.subtle.encrypt(
    { name:'AES-GCM', iv },
    key,
    new TextEncoder().encode(JSON.stringify(data))
  );
  // Gabungkan iv + ciphertext → base64
  const out = new Uint8Array(12 + enc.byteLength);
  out.set(iv);
  out.set(new Uint8Array(enc), 12);
  return btoa(String.fromCharCode(...out));
}

async function decryptLog(ciphertext, password) {
  const key     = await deriveKey(password);
  const bytes   = Uint8Array.from(atob(ciphertext), c => c.charCodeAt(0));
  const iv      = bytes.slice(0, 12);
  const payload = bytes.slice(12);
  const dec = await crypto.subtle.decrypt(
    { name:'AES-GCM', iv }, key, payload
  );
  return JSON.parse(new TextDecoder().decode(dec));
}

// ── Supabase REST API ────────────────────────────────────────────

async function sbReq(method, path, body) {
  if (location.protocol === 'file:') throw new Error('App harus diakses via https://');
  let res;
  try {
    res = await fetch(SUPABASE_URL + '/rest/v1' + path, {
      method, mode: 'cors',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json'
      },
      body: body !== undefined ? JSON.stringify(body) : undefined
    });
  } catch(fetchErr) {
    throw new Error(method + ' /rest/v1' + path.split('?')[0]
      + ' → ' + (fetchErr.name || 'NetworkError') + ': ' + fetchErr.message
      + ' | URL: ' + SUPABASE_URL);
  }
  if (!res.ok) {
    const txt = await res.text().catch(()=>'');
    throw new Error(method + ' ' + path.split('?')[0] + ' → HTTP ' + res.status 
      + (txt ? ': ' + txt.slice(0,150) : ''));
  }
  if (res.status === 204) return null;
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : null;
}
const sbFetch = sbReq;

// ── Public API ───────────────────────────────────────────────────

let _syncPassword = null;
let _userId       = null;

async function syncInit(password) {
  // Panggil ini saat user submit password di UI
  _syncPassword = password;
  _userId       = await hashPassword(password);
}

async function syncPush(log) {
  if (!_syncPassword) throw new Error('Belum login');
  const payload = await encryptLog(log, _syncPassword);
  await sbReq('POST', '/logs?on_conflict=user_id', {
    user_id: _userId, payload, updated_at: new Date().toISOString()
  });
}

async function syncPull() {
  // Download dan decrypt log dari Supabase
  if (!_syncPassword) throw new Error('Belum login');
  const rows = await sbFetch('GET', '/logs?user_id=eq.' + _userId + '&select=payload');
  if (!rows || rows.length === 0) return null;
  return decryptLog(rows[0].payload, _syncPassword);
}

async function syncLogout() {
  _syncPassword = null;
  _userId       = null;
}

async function handleSyncLogin() {
  const pw = el('syncPwInput')?.value?.trim();
  if (!pw) { setSyncStatus('Password tidak boleh kosong.', 'err'); return; }

  const btn = el('syncLoginBtn');
  btn.disabled = true; btn.textContent = 'Menghubungkan...';
  setSyncStatus('', '');

  try {
    await syncInit(pw);
    // Test koneksi dengan GET dulu
    setSyncStatus('Menghubungkan ke server...', '');
    const remote = await syncPull();
    syncLoggedIn = true;
    renderSyncPanel();
    setFormVisible(true);

    if (remote && remote.length > 0) {
      const localLog = loadLog();
      if (localLog.length === 0) {
        // Lokal kosong → pakai remote langsung
        localStorage.setItem(LK, JSON.stringify(remote));
        renderLog(); autoCalc();
        setSyncStatus('Log diambil dari server (' + remote.length + ' entri).', 'ok');
      } else {
        // Ada data di keduanya → tanya user
        const msg = 'Server punya ' + remote.length + ' entri, lokal punya ' + localLog.length +
          ' entri. Pakai yang mana?\n\n[OK] = Server\n[Cancel] = Tetap lokal';
        if (confirm(msg)) {
          localStorage.setItem(LK, JSON.stringify(remote));
          renderLog(); autoCalc();
          setSyncStatus('Menggunakan log dari server.', 'ok');
        } else {
          setSyncStatus('Menggunakan log lokal. Klik Upload untuk sync ke server.', 'ok');
        }
      }
    } else {
      setSyncStatus('Terhubung. Belum ada log di server.', 'ok');
    }
  } catch(e) {
    await syncLogout();
    const msg = e.message || 'Unknown error';
    setSyncStatus('Gagal: ' + msg, 'err');
    btn.disabled = false; btn.textContent = 'Masuk';
  }
}

function periodSortKey(pkey){
  const M={Januari:'01',Februari:'02',Maret:'03',April:'04',Mei:'05',Juni:'06',
    Juli:'07',Agustus:'08',September:'09',Oktober:'10',November:'11',Desember:'12'};
  return (pkey||'').replace(/Januari|Februari|Maret|April|Mei|Juni|Juli|Agustus|September|Oktober|November|Desember/g,m=>M[m]||m);
}
function prevEntry(){
  if(!LOG_ENABLED) return null;
  const cur = periodSortKey(getPeriodKey());
  const log = loadLog().filter(e => e._pkey && periodSortKey(e._pkey) < cur);
  return log.sort((a,b) => periodSortKey(b._pkey).localeCompare(periodSortKey(a._pkey)))[0] || null;
}

// ===== AUTO CALC =====
function inferFormulaType(expr){
  const names=[...expr.matchAll(/\{([\w.]+)\}/g)].map(m=>m[1]);
  const refs=names.map(n=>FIELD_CONFIG.find(f=>f.name===n)).filter(Boolean);
  if(refs.some(f=>f.type==='rupiah'))return 'rupiah';
  return 'number';
}
function formatFormulaResult(expr,result){
  return inferFormulaType(expr)==='rupiah'?fmtRp(result):String(Math.round(result*100)/100);
}

function evalFormula(expr){
  // Replace {field_name} with numeric value from that field's input
  try{
    const resolved=expr.replace(/\{([\w.]+)\}/g,(m,name)=>{
      const e=el('f_'+name);
      if(!e)return 0;
      return parseFloat((e.value||'').replace(',','.'))||0;
    });
    // Only allow safe characters
    if(!/^[\d\s+\-*/().]+$/.test(resolved))return NaN;
    // eslint-disable-next-line no-new-func
    return Function('return ('+resolved+')')();
  }catch(e){return NaN;}
}

function updateFormulas(){
  FIELD_CONFIG.filter(f=>f.type==='formula').forEach(f=>{
    const id='f_'+f.name;
    const inp=el(id);
    const hint=el(id+'_fl');
    if(!inp||!f.formula)return;
    const result=evalFormula(f.formula);
    if(isNaN(result)){if(inp)inp.value='error';return;}
    inp.value=formatFormulaResult(f.formula||'',result);
    if(hint){hint.textContent='';hint.className='hint';}
  });
}

function autoCalc(){
  const linkedFields = FIELD_CONFIG.filter(f =>
    (f.type==='rupiah'||f.type==='number'||f.type==='formula') &&
    (f.tracked || FIELD_CONFIG.some(x => (x.type==='selisih_pct'||x.type==='naik_turun') && x.linkedTo===f.name))
  );
  const prev = LOG_ENABLED && linkedFields.some(f=>f.tracked) ? prevEntry() : null;
  linkedFields.forEach(f => {
    let cur;
    if(f.type==='formula'){cur=evalFormula(f.formula||'');if(isNaN(cur))cur=0;}
    else{cur=parseFloat((el('f_'+f.name)?.value||'').replace(',','.')) || 0;}
    const prevVal = prev ? (parseFloat(prev[f.name]) || null) : null;
    const hintEl = el('f_'+f.name+'_hint');
    const selF = FIELD_CONFIG.find(x => x.type==='selisih_pct' && x.linkedTo===f.name);
    const ntF  = FIELD_CONFIG.find(x => x.type==='naik_turun'  && x.linkedTo===f.name);
    if(prevVal && prevVal !== 0 && cur > 0){
      const sel = (cur - prevVal) / prevVal;
      if(selF) setV('f_'+selF.name, fmtPct(Math.abs(sel)));
      if(ntF)  setV('f_'+ntF.name, sel>0?'mengalami kenaikan':sel<0?'mengalami penurunan':'tidak mengalami perubahan');
      if(hintEl){
        const lbl = prev._label || prev._pkey;
        hintEl.textContent = 'Periode lalu (' + lbl + '): ' + fmtRp(prevVal);
        hintEl.className = 'hint ok';
      }
    } else {
      if(selF && LOG_ENABLED) setV('f_'+selF.name, '');
      if(hintEl){
        const pkey = getPeriodKey();
        hintEl.textContent = (pkey && !prev) ? 'Tidak ada data sebelum periode ini' : '';
        hintEl.className = 'hint';
      }
    }
  });
  updateFormulas();
}

// ===== CLEAR FORM =====

function clearForm(){
  FIELD_CONFIG.forEach(f => {
    const e = el('f_'+f.name); if(!e) return;
    if(f.type==='bulan') e.value='';
    else if(f.type==='tahun') e.value='2026';
    else if(f.type==='naik_turun') e.value='mengalami kenaikan';
    else e.value='';
    const h = el('f_'+f.name+'_hint'); if(h){h.textContent='';h.className='hint';}
  });
  updateTerbilangHints();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===== GET FIELD VALUE FOR DOCX =====
function getFieldValue(f){
  if(f.linkedSource){
    // terbilang variant — read from base field
    const v=val('f_'+f.linkedSource);
    const baseF=FIELD_CONFIG.find(x=>x.name===f.linkedSource);
    if(baseF&&baseF.type==='tanggal') return terbilangTanggal(v);
    return terbilangUang(v);
  }
  const v = val('f_'+f.name);
  if(f.type==='formula'){
    const result=evalFormula(f.formula||'');
    if(isNaN(result))return '';
    return formatFormulaResult(f.formula||'',result);
  }
  if(f.terbilang && f.type==='rupiah') return terbilangUang(v);
  if(f.terbilang && f.type==='tanggal') return terbilangTanggal(v);
  if(f.type === 'tanggal') return fmtTanggal(v);
  if(f.type === 'rupiah') return fmtRp(parseFloat(v)||0);
  return v;
}

// ===== GENERATE =====
el('btnGen').addEventListener('click', () => {
  const btn = el('btnGen');

  // Validate field types
  for (const f of FIELD_CONFIG) {
    if (f.linkedSource) continue;
    if (f.type==='formula') continue;
    const e = el('f_'+f.name); if (!e) continue;
    const v = e.value.trim();
    if (!v) continue; // empty handled by required check
    if ((f.type==='rupiah'||f.type==='number') && isNaN(parseFloat(v))) {
      setStatus((f.label||f.name) + ': harus berupa angka.', 'err'); return;
    }
    if (f.maxlen && f.type!=='tanggal' && f.type!=='bulan' && f.type!=='tahun' && v.length > f.maxlen) {
      setStatus((f.label||f.name) + ': maksimal ' + f.maxlen + ' karakter (sekarang ' + v.length + ').', 'err');
      el('f_'+f.name)?.focus(); return;
    }
  }
  // Validate period identifier fields filled
  const emptyPeriod = periodFields.filter(f => !val('f_'+f.name));
  if(emptyPeriod.length){
    setStatus(emptyPeriod.map(f=>f.label||f.name).join(', ') + ' wajib diisi.','err');
    return;
  }

  // Validate duplicate period
  if(LOG_ENABLED){
    const pkey = getPeriodKey();
    if(pkey && loadLog().find(e => e._pkey === pkey)){
      setStatus('Periode "' + getPeriodLabel() + '" sudah ada di log. Edit atau hapus dulu.','err');
      return;
    }
  }

  btn.disabled=true; btn.textContent='Memproses...'; setStatus('','');
  try{
    const fields = {};
    FIELD_CONFIG.forEach(f => { fields[f.name] = getFieldValue(f); });

    const dec2 = new TextDecoder('utf-8'), enc = new TextEncoder();
    let xml = dec2.decode(b64u8(ALL_FILES['word/document.xml']));
    xml = replaceMergeFields(xml, fields);
    const out = [{n:'word/document.xml', d:enc.encode(xml)}];
    for(const[name,b64] of Object.entries(ALL_FILES))
      if(name!=='word/document.xml') out.push({n:name,d:b64u8(b64)});
    const blob = writeZip(out);
    const label = getPeriodLabel();
    const fname = DOC_TITLE.replace(/\s+/g,'_') + (label?'_'+label.replace(/\s+/g,'_'):'') + '.docx';
    dlBlob(blob, fname);

    if(LOG_ENABLED){
      const pkey = getPeriodKey();
      if(pkey){
        const entry = {
          _id:Date.now(),
          _ts:new Date().toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),
          _pkey:pkey,
          _label:label,
        };
        trackedFields.forEach(f => {
          let sv;
          if(f.type==='formula'){const r=evalFormula(f.formula||'');sv=isNaN(r)?0:r;}
          else{const v=(el('f_'+f.name)?.value||'').trim();sv=(f.type==='rupiah'||f.type==='number')?parseFloat(v.replace(',','.'))||0:v;}
          entry[f.name]=sv;
        });
        // Save ALL visible fields for CSV
        FIELD_CONFIG.filter(f=>!f.tracked&&!f.linkedSource&&f.type!=='selisih_pct').forEach(f=>{
          entry['_v_'+f.name]=val('f_'+f.name);
        });
        saveLogEntry(entry);
      }
    }

    btn.textContent='\u2713 Berhasil'; btn.style.background='linear-gradient(135deg,var(--accent-dark),var(--green))';
    setStatus('Cek folder Downloads / Files kamu.','ok');
    setTimeout(()=>{btn.textContent='\u2193 Generate & Unduh .docx';btn.style.background='';btn.disabled=false;autoCalc();},3000);
  }catch(e){
    setStatus('Error: '+e.message,'err');
    btn.textContent='\u2193 Generate & Unduh .docx'; btn.style.background=''; btn.disabled=false;
  }
});

el('btnClear').addEventListener('click', clearForm);

// ===== LOG UI =====
let editingLogId = null;

function renderLog(){
  if(!LOG_ENABLED) return;
  const log = loadLog();
  const lc = el('lc'); if(lc) lc.textContent = log.length ? ' \u00b7 '+log.length+' entri':'';
  const body = el('logBody'); if(!body) return;
  if(!log.length){body.innerHTML='<div class="log-empty">Belum ada riwayat.</div>';return;}

  const rows = log.map(e => {
    if(editingLogId === e._id){
      const inputs = trackedFields.map(f =>
        `<div class="ef"><label>${escX(f.label||f.name)}</label><input id="ledit_${f.name}" type="number" step="any" value="${e[f.name]||''}"></div>`
      ).join('');
      return `<tr class="edit-row"><td colspan="${2+trackedFields.length}">
        <div class="edit-grid">${inputs}</div>
        <div style="display:flex;gap:.5rem;margin-top:.75rem">
          <button class="btn-sm" onclick="saveLogEdit(${e._id})">\u2713 Simpan</button>
          <button class="btn-sm" onclick="cancelLogEdit()">Batal</button>
        </div></td></tr>`;
    }
    const cells = trackedFields.map(f => {
      const v = e[f.name];
      const disp = v == null ? '-' : f.type === 'rupiah' ? fmtRp(v) : String(v);
      return `<td style="font-size:.8rem">${disp}</td>`;
    }).join('');
    return `<tr>
      <td style="font-size:.72rem;color:var(--muted);white-space:nowrap">${e._ts||''}</td>
      <td style="white-space:nowrap"><strong>${escX(e._label||e._pkey||'')}</strong></td>
      ${cells}
      <td style="white-space:nowrap">
        <button class="ic edit" onclick="startLogEdit(${e._id})" title="Edit">&#9998;</button>\n        <button class="ic dl" onclick="regenFromLog(${e._id})" title="Download .docx">&#8595;</button>\n        <button class="ic del" onclick="deleteLogEntry(${e._id})" title="Hapus">&#10005;</button>\n      </td></tr>`;
  }).join('');

  const headers = trackedFields.map(f => `<th>${escX(f.label||f.name)}</th>`).join('');
  body.innerHTML = `<table class="log-table"><thead><tr><th>Dibuat</th><th>Periode</th>${headers}<th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

function regenFromLog(id){
  const e=loadLog().find(x=>x._id===id); if(!e)return;
  try{
    const saved={};
    FIELD_CONFIG.forEach(f=>{const i=el('f_'+f.name);if(i)saved[f.name]=i.value;});
    FIELD_CONFIG.forEach(f=>{
      const i=el('f_'+f.name); if(!i||f.type==='formula')return;
      i.value=e[f.name]!==undefined?String(e[f.name]):e['_v_'+f.name]!==undefined?String(e['_v_'+f.name]):'';
    });
    updateFormulas();
    const fields={};
    FIELD_CONFIG.forEach(f=>{fields[f.name]=getFieldValue(f);});
    const d2=new TextDecoder('utf-8'),enc=new TextEncoder();
    let xml=d2.decode(b64u8(ALL_FILES['word/document.xml']));
    xml=replaceMergeFields(xml,fields);
    xml=replacePlaceholders(xml,fields);
    const outs=[{n:'word/document.xml',d:enc.encode(xml)}];
    for(const[nm,b64]of Object.entries(ALL_FILES))if(nm!=='word/document.xml')outs.push({n:nm,d:b64u8(b64)});
    FIELD_CONFIG.forEach(f=>{const i=el('f_'+f.name);if(i)i.value=saved[f.name]||'';});
    updateFormulas();
    dlBlob(writeZip(outs),DOC_TITLE.replace(/\s+/g,'_')+'_'+(e._label||e._pkey||id)+'.docx');
    setStatus('Dokumen '+(e._label||e._pkey||'')+' diunduh.','ok');
  }catch(err){setStatus('Error: '+err.message,'err');}
}

function startLogEdit(id){ editingLogId=id; renderLog(); }
function cancelLogEdit(){ editingLogId=null; renderLog(); }
function saveLogEdit(id){
  const log=loadLog(), idx=log.findIndex(e=>e._id===id); if(idx<0)return;
  const upd={...log[idx]};
  trackedFields.forEach(f=>{ upd[f.name]=parseFloat(el('ledit_'+f.name)?.value)||0; });
  log[idx]=upd;
  log.sort((a,b)=>(b._pkey||'').localeCompare(a._pkey||''));
  localStorage.setItem(LK,JSON.stringify(log));
  editingLogId=null; renderLog(); autoCalc(); setStatus('Entri diperbarui.','ok');
}

function importCSV(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const text=ev.target.result.replace(/^\uFEFF/,'');
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){setStatus('CSV kosong.','err');return;}
      const parseRow=row=>{
        const cols=[]; let cur='',inQ=false;
        for(let i=0;i<row.length;i++){
          const c=row[i];
          if(c==='"'&&!inQ){inQ=true;}
          else if(c==='"'&&inQ&&row[i+1]==='"'){cur+='"';i++;}
          else if(c==='"'&&inQ){inQ=false;}
          else if(c===','&&!inQ){cols.push(cur);cur='';}
          else cur+=c;
        }
        cols.push(cur); return cols;
      };
      const headers=parseRow(lines[0]);
      const log=loadLog();
      let added=0,skipped=0;
      const csvFields=FIELD_CONFIG.filter(f=>!f.linkedSource&&f.type!=='selisih_pct'&&f.type!=='formula');
      const pFields=FIELD_CONFIG.filter(f=>f.periodId);
      for(let i=1;i<lines.length;i++){
        const cols=parseRow(lines[i]);
        const row={}; headers.forEach((h,j)=>{row[h]=(cols[j]||'').trim();});
        const entry={_id:Date.now()+i,_ts:row['Dibuat']||new Date().toLocaleString('id-ID'),_pkey:'',_label:''};
        pFields.forEach(f=>{
          const v=row[f.label||f.name]||'';
          if(v){entry['_v_'+f.name]=v;entry._pkey+=(entry._pkey?'__':'')+v;entry._label+=(entry._label?' ':'')+v;}
        });
        if(!entry._pkey){skipped++;continue;}
        if(log.find(x=>x._pkey===entry._pkey)){skipped++;continue;}
        csvFields.forEach(f=>{
          const v=row[f.label||f.name];
          if(v!==undefined&&v!==''){
            if(f.tracked){const n=parseFloat(v);entry[f.name]=isNaN(n)?v:n;}
            else entry['_v_'+f.name]=v;
          }
        });
        log.push(entry); added++;
      }
      log.sort((a,b)=>periodSortKey(b._pkey).localeCompare(periodSortKey(a._pkey)));
      localStorage.setItem(LK,JSON.stringify(log));
      renderLog();autoCalc();
      setStatus(added+' entri diimport'+(skipped?' ('+skipped+' dilewati)':'')+'!','ok');
    }catch(err){setStatus('Error import: '+err.message,'err');}
    input.value='';
  };
  reader.readAsText(file,'utf-8');
}

function exportCSV(){
  const log=loadLog(); if(!log.length)return;
  const csvFields=FIELD_CONFIG.filter(f=>!f.linkedSource&&f.type!=='selisih_pct');
  const H=['Dibuat','Periode',...csvFields.map(f=>f.label||f.name)];
  const rows=log.map(e=>[
    e._ts||'', e._label||e._pkey||'',
    ...csvFields.map(f=>{
      if(e[f.name]!==undefined) return e[f.name];
      return e['_v_'+f.name]??'';
    })
  ].map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(','));
  const csv='\uFEFF'+H.map(h=>'"'+h+'"').join(',')+'\n'+rows.join('\n');
  const r=new FileReader();
  r.onloadend=()=>{const a=document.createElement('a');a.href=r.result;a.download='log_'+DOC_TITLE.replace(/\W+/g,'_')+'.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);};
  r.readAsDataURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
}

// ===== TERBILANG HINTS =====
function updateTerbilangHints() {
  FIELD_CONFIG.filter(f => (f.terbilang||f.terbilang_mode==='both') && (f.type==='rupiah'||f.type==='tanggal')).forEach(f => {
    const inp = el('f_'+f.name);
    const hint = el('f_'+f.name+'_tb');
    if (!inp || !hint) return;
    const v = inp.value.trim();
    if (!v) { hint.textContent = ''; return; }
    try {
      hint.textContent = f.type==='rupiah' ? terbilangUang(v) : terbilangTanggal(v);
      hint.className = 'hint ok';
    } catch(e2) { hint.textContent = ''; hint.className = 'hint'; }
  });
}

// ===== PERIOD FIELD CHANGE LISTENERS =====
// Update formulas on any input change
document.addEventListener('input', e=>{
  if(e.target.id && e.target.id.startsWith('f_')) updateFormulas();
});

periodFields.forEach(f => {
  const e = el('f_'+f.name);
  if(e) e.addEventListener('change', autoCalc);
  if(e) e.addEventListener('input', autoCalc);
});
FIELD_CONFIG.filter(f => f.terbilang && (f.type==='rupiah'||f.type==='tanggal')).forEach(f => {
  const e = el('f_'+f.name);
  if(e) e.addEventListener('input', updateTerbilangHints);
  if(e) e.addEventListener('change', updateTerbilangHints);
});

// ===== INIT =====
renderForm();
updateTerbilangHints();
updateFormulas();
const _sc=el('syncCard');if(_sc)_sc.style.display='block';
renderSyncPanel();
setFormVisible(false);
if(LOG_ENABLED){
  const ls = el('logSection'); if(ls) ls.style.display='block';
  renderLog(); autoCalc();
}
